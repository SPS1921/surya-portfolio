<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', Arial, sans-serif">
  <rect width="800" height="500" fill="#16130E"/>
  <text x="56" y="74" fill="#8F887A" font-size="15" letter-spacing="3" font-weight="500">RESEARCH OPS</text>
  <!-- connecting lines from hub -->
  <g stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="2">
    <line x1="400" y1="270" x2="170" y2="160"/>
    <line x1="400" y1="270" x2="170" y2="380"/>
    <line x1="400" y1="270" x2="630" y2="160"/>
    <line x1="400" y1="270" x2="630" y2="380"/>
  </g>
  <!-- satellite nodes -->
  <g font-size="13" font-weight="600" text-anchor="middle">
    <g>
      <rect x="92" y="132" width="156" height="56" rx="14" fill="#221C14" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <circle cx="120" cy="160" r="8" fill="#5B9CFF"/>
      <text x="150" y="166" fill="#EFEBE2" text-anchor="start">Clients</text>
    </g>
    <g>
      <rect x="92" y="352" width="156" height="56" rx="14" fill="#221C14" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <circle cx="120" cy="380" r="8" fill="#A78BFA"/>
      <text x="150" y="386" fill="#EFEBE2" text-anchor="start">Vendors</text>
    </g>
    <g>
      <rect x="552" y="132" width="156" height="56" rx="14" fill="#221C14" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <circle cx="580" cy="160" r="8" fill="#34D399"/>
      <text x="610" y="166" fill="#EFEBE2" text-anchor="start">Moderators</text>
    </g>
    <g>
      <rect x="552" y="352" width="156" height="56" rx="14" fill="#221C14" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <circle cx="580" cy="380" r="8" fill="#FBBF24"/>
      <text x="610" y="386" fill="#EFEBE2" text-anchor="start">Data team</text>
    </g>
  </g>
  <!-- central hub -->
  <circle cx="400" cy="270" r="78" fill="#2A2318"/>
  <circle cx="400" cy="270" r="78" fill="none" stroke="#FF5A2C" stroke-width="2" stroke-dasharray="4 6"/>
  <text x="400" y="262" text-anchor="middle" fill="#EFEBE2" font-size="16" font-weight="600">Research</text>
  <text x="400" y="286" text-anchor="middle" fill="#FF5A2C" font-size="16" font-weight="600">Ops</text>
  <!-- field tags -->
  <g font-size="12" font-weight="600" text-anchor="middle" fill="#ADA697">
    <rect x="300" y="424" width="62" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.07"/><text x="331" y="442">Qual</text>
    <rect x="369" y="424" width="62" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.07"/><text x="400" y="442">Quant</text>
    <rect x="438" y="424" width="62" height="28" rx="14" fill="#FFFFFF" fill-opacity="0.07"/><text x="469" y="442">Retail</text>
  </g>
</svg>
