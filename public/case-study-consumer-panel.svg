<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk', Arial, sans-serif">
  <rect width="800" height="500" fill="#16130E"/>
  <text x="56" y="74" fill="#8F887A" font-size="15" letter-spacing="3" font-weight="500">INTERNAL PRODUCT</text>
  <!-- dashboard frame -->
  <rect x="56" y="104" width="688" height="350" rx="20" fill="#221C14" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <line x1="56" y1="150" x2="744" y2="150" stroke="#FFFFFF" stroke-opacity="0.08"/>
  <circle cx="82" cy="127" r="5" fill="#FF5A2C"/>
  <circle cx="100" cy="127" r="5" fill="#FFFFFF" fill-opacity="0.2"/>
  <circle cx="118" cy="127" r="5" fill="#FFFFFF" fill-opacity="0.2"/>
  <rect x="600" y="118" width="120" height="18" rx="9" fill="#FFFFFF" fill-opacity="0.08"/>
  <!-- KPI tiles -->
  <g>
    <rect x="80" y="176" width="180" height="86" rx="12" fill="#16130E"/>
    <text x="100" y="208" fill="#8F887A" font-size="12">Open tasks</text>
    <text x="100" y="240" fill="#EFEBE2" font-size="30" font-weight="700">48</text>
  </g>
  <g>
    <rect x="276" y="176" width="180" height="86" rx="12" fill="#EFEBE2"/>
    <text x="296" y="208" fill="#16130E" fill-opacity="0.6" font-size="12">On track</text>
    <text x="296" y="240" fill="#16130E" font-size="30" font-weight="700">92%</text>
  </g>
  <g>
    <rect x="472" y="176" width="180" height="86" rx="12" fill="#FF5A2C"/>
    <text x="492" y="208" fill="#FFFFFF" fill-opacity="0.85" font-size="12">Owners</text>
    <text x="492" y="240" fill="#FFFFFF" font-size="30" font-weight="700">12</text>
  </g>
  <!-- bar chart -->
  <g>
    <rect x="80" y="286" width="300" height="148" rx="12" fill="#16130E"/>
    <rect x="108" y="386" width="34" height="30" rx="4" fill="#FFFFFF" fill-opacity="0.3"/>
    <rect x="156" y="356" width="34" height="60" rx="4" fill="#FFFFFF" fill-opacity="0.45"/>
    <rect x="204" y="332" width="34" height="84" rx="4" fill="#FFFFFF" fill-opacity="0.6"/>
    <rect x="252" y="346" width="34" height="70" rx="4" fill="#FFFFFF" fill-opacity="0.45"/>
    <rect x="300" y="312" width="34" height="104" rx="4" fill="#FF5A2C"/>
  </g>
  <!-- line chart -->
  <g>
    <rect x="396" y="286" width="256" height="148" rx="12" fill="#16130E"/>
    <polyline points="420,400 460,376 500,388 540,344 580,356 620,316" fill="none" stroke="#FF5A2C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="620" cy="316" r="5" fill="#FF5A2C"/>
    <polyline points="420,408 460,400 500,404 540,386 580,392 620,372" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="2.5" stroke-dasharray="3 5"/>
  </g>
